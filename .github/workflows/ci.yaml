name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy belay
      - name: Test (fast loop)
        run: pytest
      - name: Test (full suite, incl. slow)
        run: pytest -m "" --no-cov
