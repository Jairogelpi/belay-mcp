name: Release

# Publishes belay-mcp to PyPI via trusted publishing (OIDC) when a version
# tag is pushed. No API tokens/secrets: this relies on PyPI's trusted
# publisher configuration for this repo + workflow (see
# https://docs.pypi.org/trusted-publishers/), which the maintainer must set
# up on the PyPI project *before* the first real tag push -- an agent
# cannot do that (it requires PyPI account access). Until that's done, this
# workflow will fail at the publish step; the build/test steps still run
# and are useful signal on their own.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/belay-mcp
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
